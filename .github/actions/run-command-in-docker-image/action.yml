name: Run Command on Host or in Docker Image
description: Run a shell command on the host or inside a Docker image, optionally with the checked out repository mounted into the container.

inputs:
  execution-mode:
    description: Whether to run the command on the host or in Docker.
    required: false
    default: container
  image-name:
    description: Docker image tag to run when execution-mode is container.
    required: false
    default: ""
  command:
    description: Shell command to execute.
    required: true
  environment-variables:
    description: Multiline list of environment variables in KEY=VALUE form to set for the command.
    required: false
    default: ""
  mount-workspace:
    description: Whether to mount GITHUB_WORKSPACE into the container.
    required: false
    default: "true"
  workspace-mount-target:
    description: Container path for the mounted workspace.
    required: false
    default: /project

runs:
  using: composite
  steps:
    - name: Validate Docker execution inputs
      if: ${{ inputs.execution-mode == 'container' }}
      shell: bash
      run: |
        set -euo pipefail
        if [[ -z "${{ inputs.image-name }}" ]]; then
          echo "image-name input is required for container execution" >&2
          exit 1
        fi

    - name: Run command on host (non-Windows)
      if: ${{ inputs.execution-mode == 'host' && runner.os != 'Windows' }}
      shell: bash
      run: |
        set -euo pipefail

        while IFS= read -r environment_variable; do
          [[ -z "${environment_variable}" ]] && continue
          export "${environment_variable}"
        done <<'EOF'
        ${{ inputs.environment-variables }}
        EOF

        command_file="${RUNNER_TEMP}/host-command.sh"
        cat > "${command_file}" <<'EOF'
        ${{ inputs.command }}
        EOF

        bash "${command_file}"

    - name: Run command on host (Windows)
      if: ${{ inputs.execution-mode == 'host' && runner.os == 'Windows' }}
      shell: powershell
      run: |
        $envBlock = @'
        ${{ inputs.environment-variables }}
        '@

        foreach ($environmentVariable in ($envBlock -split "`r?`n")) {
          if ([string]::IsNullOrWhiteSpace($environmentVariable)) {
            continue
          }

          $parts = $environmentVariable -split '=', 2
          if ($parts.Length -ne 2) {
            throw "Invalid environment variable format: $environmentVariable"
          }

          [System.Environment]::SetEnvironmentVariable($parts[0], $parts[1])
        }

        $commandFile = Join-Path $env:RUNNER_TEMP "host-command.ps1"
        @'
        ${{ inputs.command }}
        '@ | Set-Content -Path $commandFile -NoNewline

        & $commandFile
        if (-not $?) {
          throw "Host command failed with exit code: $LASTEXITCODE"
        }

    - name: Run command in Docker image
      if: ${{ inputs.execution-mode == 'container' }}
      shell: bash
      run: |
        set -euo pipefail

        command_file="${RUNNER_TEMP}/docker-command.sh"
        cat > "${command_file}" <<'EOF'
        ${{ inputs.command }}
        EOF

        docker_args=(--rm)

        if [[ "${{ inputs.mount-workspace }}" == "true" ]]; then
          docker_args+=(--mount "type=bind,source=${GITHUB_WORKSPACE},target=${{ inputs.workspace-mount-target }}")
        fi

        while IFS= read -r environment_variable; do
          [[ -z "${environment_variable}" ]] && continue
          docker_args+=(-e "${environment_variable}")
        done <<'EOF'
        ${{ inputs.environment-variables }}
        EOF

        docker run "${docker_args[@]}" "${{ inputs.image-name }}" /bin/sh -c "$(cat "${command_file}")"
