name: Run Build Linux Container
description: Build in a Linux Docker container, replace shared artifacts, validate outputs, and publish artifacts.

inputs:
  artifact-name:
    description: Artifact suffix for uploaded outputs.
    required: true
  build-target:
    description: Build target to execute.
    required: false
    default: BuildWorkflow
  dockerfile:
    description: Path to the Dockerfile used for container execution.
    required: true
  image-name:
    description: Docker image tag used for container execution.
    required: true
  environment-variables:
    description: Multiline list of environment variables in KEY=VALUE form to set in the build container.
    required: false
    default: ""
  replace-artifacts:
    description: Multiline list of replacements in the form <artifact_name>!<path>.
    required: false
    default: ""
  log-directory:
    description: Log directory expected to contain profiler output after the smoke test.
    required: false
    default: /var/log/opentelemetry/dotnet

runs:
  using: composite
  steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      uses: docker/build-push-action@v7
      with:
        context: .
        file: ${{ inputs.dockerfile }}
        load: true
        tags: ${{ inputs.image-name }}

    - name: Start build container
      id: start-build-container
      shell: bash
      run: |
        set -u
        echo "::group::Start build container"
        sanitized_name="$(echo "${{ inputs.image-name }}" | tr '[:upper:]' '[:lower:]' | tr -c 'a-z0-9' '-')"
        container_name="${sanitized_name}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"

        docker_args=(
          --detach
          --name "${container_name}"
          --mount "type=bind,source=${GITHUB_WORKSPACE},target=/project"
          --workdir /project
          -e "NUGET_PACKAGES=/project/packages"
        )

        while IFS= read -r environment_variable; do
          [[ -z "${environment_variable}" ]] && continue
          docker_args+=(-e "${environment_variable}")
        done <<'EOF'
        ${{ inputs.environment-variables }}
        EOF

        docker run "${docker_args[@]}" "${{ inputs.image-name }}" /bin/sh -c 'git config --global --add safe.directory /project && trap "exit 0" TERM INT; while true; do sleep 3600; done'
        echo "container_name=${container_name}" >> "$GITHUB_OUTPUT"
        echo "::endgroup::"
        
    - name: Check for NuGet packages cache
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # tag: v5.0.5
      id: nuget-cache
      with:
        key: ${{ hashFiles('**/Directory.packages.props', './build/LibraryVersions.g.cs', '**/packages.config' ) }}
        path: ${{ env.NUGET_PACKAGES }}

    - name: Restore NuGet packages
      if: ${{ steps.nuget-cache.outputs.cache-hit != 'true' }}
      uses: ./.github/actions/run-command-in-environment
      with:
        container-name: ${{ steps.start-build-container.outputs.container_name }}
        run: |
          echo "::group::Restore NuGet packages"
          ./build.sh Restore
          echo "::endgroup::"

    - name: Run build target in container
      uses: ./.github/actions/run-command-in-environment
      with:
        container-name: ${{ steps.start-build-container.outputs.container_name }}
        run: |
          echo "::group::Run build target"
          ./build.sh ${{ inputs.build-target }} --no-restore ${{ steps.nuget-cache.outputs.cache-hit != 'true' }}
          echo "::endgroup::"

    - name: Cache NuGet packages
      if: ${{ steps.nuget-cache.outputs.cache-hit != 'true' }}
      uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # tag: v5.0.5
      with:
        key: ${{ hashFiles('**/Directory.packages.props', './build/LibraryVersions.g.cs', '**/packages.config' ) }}
        path: ${{ env.NUGET_PACKAGES }}

    - name: Replace build artifacts
      uses: ./.github/actions/replace-build-artifacts
      with:
        replace-artifacts: ${{ inputs.replace-artifacts }}

    - name: Test the Shell scripts from README.md in Docker container
      uses: ./.github/actions/run-command-in-environment
      with:
        container-name: ${{ steps.start-build-container.outputs.container_name }}
        run: |
          echo "::group::Smoke test installation scripts"
          dotnet publish -f net10.0 -c Release ./test/test-applications/integrations/TestApplication.Smoke
          export OTEL_DOTNET_AUTO_HOME="${PWD}/bin/tracer-home"
          . ./instrument.sh
          ./test/test-applications/integrations/bin/TestApplication.Smoke/Release/net10.0/publish/TestApplication.Smoke
          test "$(ls -A '${{ inputs.log-directory }}')"
          echo "::endgroup::"

    - name: Upload binaries
      if: ${{ !cancelled() }}
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # tag: v7.0.1
      with:
        name: bin-${{ inputs.artifact-name }}
        path: bin/tracer-home
      continue-on-error: true

    - name: Stop build container
      if: ${{ always() && steps.start-build-container.outputs.container_name != '' }}
      shell: bash
      run: |
        set -u
        echo "::group::Stop build container"
        docker rm -f "${{ steps.start-build-container.outputs.container_name }}"
        echo "::endgroup::"
