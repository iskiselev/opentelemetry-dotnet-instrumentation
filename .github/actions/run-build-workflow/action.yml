name: Run Build Workflow
description: Set up the SDKs, restore dependencies, and run a build target on the host or in Docker.

inputs:
  execution-mode:
    description: Whether to run the build target on the host or in Docker.
    required: false
    default: host
  build-target:
    description: Build target to execute.
    required: false
    default: BuildWorkflow
  dockerfile:
    description: Path to the Dockerfile used for container execution.
    required: false
    default: ""
  image-name:
    description: Docker image tag used for container execution.
    required: false
    default: ""
  environment-variables:
    description: Multiline list of environment variables in KEY=VALUE form to set for the build command.
    required: false
    default: ""
  container-setup-command:
    description: Additional setup command to run inside the container before the build target.
    required: false
    default: git config --global --add safe.directory /project

outputs:
  container-name:
    description: Running build container name when execution-mode is container.
    value: ${{ steps.start-build-container.outputs.container_name }}

runs:
  using: composite
  steps:
    - name: Setup .NET
      if: ${{ inputs.execution-mode == 'host' }}
      uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # tag: v5.2.0
      with:
        dotnet-version: |
          8.0.419
          9.0.312
          10.0.201

    - name: Check for NuGet packages cache
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # tag: v5.0.5
      id: nuget-cache
      with:
        key: ${{ hashFiles('**/Directory.packages.props', './build/LibraryVersions.g.cs', '**/packages.config' ) }}
        path: ${{ env.NUGET_PACKAGES }}

    - name: Restore NuGet packages
      if: ${{ inputs.execution-mode == 'host' && steps.nuget-cache.outputs.cache-hit != 'true' }}
      uses: ./.github/actions/run-command-in-environment
      with:
        run: ./build.cmd Restore

    - name: Validate container inputs
      if: ${{ inputs.execution-mode == 'container' }}
      shell: bash
      run: |
        set -euo pipefail
        if [[ -z "${{ inputs.dockerfile }}" ]]; then
          echo "dockerfile input is required for container execution" >&2
          exit 1
        fi
        if [[ -z "${{ inputs.image-name }}" ]]; then
          echo "image-name input is required for container execution" >&2
          exit 1
        fi

    - name: Set up Docker Buildx
      if: ${{ inputs.execution-mode == 'container' }}
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      if: ${{ inputs.execution-mode == 'container' }}
      uses: docker/build-push-action@v7
      with:
        context: .
        file: ${{ inputs.dockerfile }}
        load: true
        tags: ${{ inputs.image-name }}

    - name: Start build container
      if: ${{ inputs.execution-mode == 'container' }}
      id: start-build-container
      shell: bash
      run: |
        set -euo pipefail

        sanitized_name="$(echo "${{ inputs.image-name }}" | tr '[:upper:]' '[:lower:]' | tr -c 'a-z0-9' '-')"
        container_name="${sanitized_name}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"

        docker_args=(
          --detach
          --name "${container_name}"
          --mount "type=bind,source=${GITHUB_WORKSPACE},target=/project"
          --workdir /project
          -e "NUGET_PACKAGES=/project/packages"
        )

        while IFS= read -r environment_variable; do
          [[ -z "${environment_variable}" ]] && continue
          docker_args+=(-e "${environment_variable}")
        done <<'EOF'
        ${{ inputs.environment-variables }}
        EOF

        docker run "${docker_args[@]}" "${{ inputs.image-name }}" /bin/sh -c 'trap "exit 0" TERM INT; while true; do sleep 3600; done'

        echo "container_name=${container_name}" >> "$GITHUB_OUTPUT"

    - name: Prepare build container
      if: ${{ inputs.execution-mode == 'container' }}
      uses: ./.github/actions/run-command-in-environment
      with:
        container-name: ${{ steps.start-build-container.outputs.container_name }}
        run: |
          set -e
          ${{ inputs.container-setup-command }}

    - name: Run build target on host
      if: ${{ inputs.execution-mode == 'host' }}
      uses: ./.github/actions/run-command-in-environment
      with:
        run: ./build.cmd ${{ inputs.build-target }} --no-restore ${{ steps.nuget-cache.outputs.cache-hit != 'true' }}

    - name: Run build target in container
      if: ${{ inputs.execution-mode == 'container' }}
      uses: ./.github/actions/run-command-in-environment
      with:
        container-name: ${{ steps.start-build-container.outputs.container_name }}
        run: ./build.sh ${{ inputs.build-target }}

    - name: Cache NuGet packages
      if: ${{ steps.nuget-cache.outputs.cache-hit != 'true' }}
      uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # tag: v5.0.5
      with:
        key: ${{ hashFiles('**/Directory.packages.props', './build/LibraryVersions.g.cs', '**/packages.config' ) }}
        path: ${{ env.NUGET_PACKAGES }}
