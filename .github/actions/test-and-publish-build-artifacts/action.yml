name: Test and Publish Build Artifacts
description: Run common post-build validation and publish tracer-home plus installation scripts.

inputs:
  log-directory:
    description: Log directory expected to contain profiler output after smoke test.
    required: true
  run-powershell-module-test:
    description: Whether to run the Windows PowerShell module validation step.
    required: false
    default: "false"
  powershell-log-path:
    description: Windows log path glob expected to contain profiler output after PowerShell module test.
    required: false
    default: ""
  binaries-artifact-name:
    description: Artifact name for uploaded tracer-home binaries.
    required: true
  installation-scripts-artifact-name:
    description: Artifact name for uploaded installation scripts.
    required: true

runs:
  using: composite
  steps:
    - name: Test the Shell scripts from README.md
      shell: bash
      run: |
        set -e
        dotnet publish -f net10.0 -c Release ./test/test-applications/integrations/TestApplication.Smoke
        export OTEL_DOTNET_AUTO_HOME="${PWD}/bin/tracer-home"
        . ./instrument.sh
        ./test/test-applications/integrations/bin/TestApplication.Smoke/Release/net10.0/publish/TestApplication.Smoke
          test "$(ls -A '${{ inputs.log-directory }}' )"

    - name: Test the Windows PowerShell module instructions from README.md
      if: ${{ inputs.run-powershell-module-test == 'true' }}
      shell: powershell
      run: |
        $log_path = "${{ inputs.powershell-log-path }}"
        Import-Module "${PWD}/bin/installation-scripts/OpenTelemetry.DotNet.Auto.psm1"
        [System.Environment]::SetEnvironmentVariable("OTEL_DOTNET_AUTO_INSTALL_DIR", "${PWD}/bin/tracer-home", [System.EnvironmentVariableTarget]::Machine)
        Register-OpenTelemetryForCurrentSession -OTelServiceName "MyServiceDisplayName"
        ./test/test-applications/integrations/bin/TestApplication.Smoke/Release/net10.0/TestApplication.Smoke.exe
        if (-not $?) { throw "dotnet help returned exit code: $LASTEXITCODE" }
        if (-not (Test-Path $log_path)) { throw "Log file does not exist. Instrumentation test failed." }
        Remove-Item $log_path
        Unregister-OpenTelemetryForCurrentSession
        ./test/test-applications/integrations/bin/TestApplication.Smoke/Release/net10.0/TestApplication.Smoke.exe
        if (-not $?) { throw "dotnet help returned exit code: $LASTEXITCODE" }
        if (Test-Path $log_path) { throw "Log file exists. Instrumentation unregister failed." }

    - name: Upload binaries
      if: ${{ always() }}
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # tag: v7.0.1
      with:
        name: ${{ inputs.binaries-artifact-name }}
        path: bin/tracer-home

    - name: Upload installation scripts
      if: ${{ always() }}
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # tag: v7.0.1
      with:
        name: ${{ inputs.installation-scripts-artifact-name }}
        path: bin/installation-scripts

    - name: Regenerate LibraryVersions.g.cs
      shell: bash
      run: ./build.cmd GenerateLibraryVersionFiles

    - name: Generated files unchanged
      shell: bash
      run: |
        git status
        git config color.diff always
        git --no-pager diff
        [[ -z "$(git status --porcelain)" ]]
